<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Municipality Project Tracker{% endblock %}</title>
</head>
<body>
    <header>
        <nav>
            <h1>Municipality Project Tracker</h1>
            {% if user.is_authenticated %}
                <ul>
                    <li><a href="{% url 'admin_dashboard' %}">Dashboard</a></li>
                    <li><a href="{% url 'user_list' %}">Users</a></li>
                    <li><a href="{% url 'logout' %}">Logout</a></li>
                    <li>Welcome, {{ user.username }}</li>
                </ul>
            {% else %}
                <ul>
                    <li><a href="{% url 'login' %}">Login</a></li>
                </ul>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}
        <!-- Content goes here -->
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Municipality Project Tracker. All rights reserved.</p>
    </footer>
</body>
</html>
